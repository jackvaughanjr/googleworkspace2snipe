# googleworkspace2snipe configuration
# Copy this file to settings.yaml and fill in your values.
# settings.yaml is gitignored and should never be committed.
#
# All values can be overridden with environment variables.
# See CONTEXT.md for the full list of env var overrides and Google Cloud setup.

google_workspace:
  # Path to the service account JSON key file.
  # The service account must have domain-wide delegation granted in the
  # Google Admin Console with the scope:
  #   https://www.googleapis.com/auth/apps.licensing
  # See CONTEXT.md for full setup instructions.
  credentials_file: "path/to/service-account.json"

  # Email address of a Google Workspace super admin to impersonate.
  # The service account acts on behalf of this account to list licenses.
  # Must be a super admin (not just a delegated admin).
  admin_email: "admin@your-domain.example.com"

  # Your Google Workspace primary domain (e.g. "example.com").
  domain: "your-domain.example.com"

  # Optional: restrict sync to specific Organizational Units (and their subtrees).
  # Users outside these OUs are ignored for both checkout and checkin — their
  # seats in Snipe-IT are left untouched. Leave empty to sync all active users.
  # Each path must start with "/" (e.g. "/Engineering"). The root OU is "/".
  # Requires the admin.directory.user.readonly DWD scope (see CONTEXT.md).
  ou_paths: []
  # ou_paths:
  #   - "/Engineering"
  #   - "/Sales"

  # Optional: SKU names or IDs whose Snipe-IT seat notes should include
  # per-user OU path and admin status in addition to the standard product/SKU
  # identifiers. Matching is case-insensitive against either the SKU name or
  # SKU ID. Use the SKU name as it appears in `googleworkspace2snipe test` output.
  # Requires the admin.directory.user.readonly DWD scope (see CONTEXT.md).
  # Example: the primary license every user holds is a good candidate, since
  # its notes then reflect each user's current department and admin status.
  enrich_notes_for_skus: []
  # enrich_notes_for_skus:
  #   - "Google Workspace Business Plus"   # match by SKU name
  #   - "1010020020"                        # or by SKU ID

  # Google Workspace product IDs to query for license assignments.
  # Each product may contain multiple SKUs (e.g. Business Starter, Business Plus).
  # Leave empty to use the built-in defaults (covers the most common products).
  # Only products with at least one active assignment produce a Snipe-IT license.
  # Full list of product IDs: https://developers.google.com/admin-sdk/licensing/v1/how-tos/products
  product_ids: []
  # product_ids:
  #   - "Google-Apps"           # Google Workspace Business / Enterprise / Education
  #   - "Google-Vault"          # Google Vault
  #   - "Google-Drive-storage"  # Google additional storage
  #   - "Cloud-Identity"        # Cloud Identity Free / Premium
  #   - "Google-Voice"          # Google Voice Starter / Standard / Premier

  # Optional: prefix prepended verbatim to every SKU name in Snipe-IT.
  # Include any desired separator — e.g. "Acme - " (note the trailing space and dash).
  # Result: "Acme - Google Workspace Business Plus"
  license_name_prefix: ""

  # Optional: suffix appended verbatim to every SKU name in Snipe-IT.
  # Useful for distinguishing multiple tenants on the same Snipe-IT instance.
  # Include any desired separator — e.g. " (acme.com)" (note the leading space).
  # Result: "Google Workspace Business Plus (acme.com)"
  license_name_suffix: ""

snipe_it:
  # Base URL of your Snipe-IT instance.
  url: "https://your-snipe-it-instance.example.com"

  # Snipe-IT API key with license management permissions.
  # Generate one at: Admin → API Keys
  api_key: ""

  # Snipe-IT category ID to assign to licenses when created. Required.
  # Find IDs at: Admin → Categories, or via the Snipe-IT API.
  # All Google Workspace licenses will share this category.
  license_category_id: 0

  # Optional: manufacturer ID for "Google".
  # If 0, googleworkspace2snipe will automatically find or create a
  # "Google" manufacturer in Snipe-IT on the first run.
  license_manufacturer_id: 0

  # Optional: supplier ID. If 0, no supplier is set on created licenses.
  license_supplier_id: 0

sync:
  # Simulate a full sync without making any changes.
  # Overridden by the --dry-run flag.
  dry_run: false

  # Re-sync seat notes even if they appear up to date.
  # Overridden by the --force flag.
  force: false

slack:
  # Incoming webhook URL for Slack notifications.
  # Optional. If omitted, all notifications are silently skipped.
  # Can be overridden with the SLACK_WEBHOOK environment variable.
  # Three events trigger notifications (all suppressed in dry-run):
  #   1. Sync failure
  #   2. Active Google Workspace user with no matching Snipe-IT account
  #      (deduplicated across SKUs — one message per user, not per SKU)
  #   3. Sync success summary
  webhook_url: ""
